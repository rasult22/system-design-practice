global
    log stdout format raw local0

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

listen postgres
    bind *:5000
    option httpchk GET /
    http-check expect status 200

    default-server inter 2s fall 3 rise 2
    server pg1 postgres:5432 check port 8008
    server pg2 postgres_replica:5432 check port 8008
