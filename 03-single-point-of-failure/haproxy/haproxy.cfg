global
    log stdout format raw local0

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

listen postgres
    bind *:5000
    option tcp-check
    server primary postgres:5432 check inter 2s fall 3 rise 2
    server replica postgres_replica:5432 check inter 2s fall 3 rise 2 backup

