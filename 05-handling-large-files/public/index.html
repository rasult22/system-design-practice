<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Exchange</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 30px; }
    .upload-section, .files-section { margin-bottom: 30px; }
    input[type="file"] { margin-right: 10px; }
    button { padding: 6px 16px; cursor: pointer; }
    .progress { margin-top: 10px; display: none; }
    .progress-bar { width: 100%; height: 20px; background: #eee; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4caf50; transition: width 0.2s; }
    .file-list { list-style: none; padding: 0; }
    .file-list li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    .file-list a { color: #1976d2; text-decoration: none; }
    .file-list a:hover { text-decoration: underline; }
    .status { margin-top: 8px; font-size: 14px; color: #666; }
  </style>
</head>
<body>
  <h1>File Exchange</h1>

  <div class="upload-section">
    <h2>Upload</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="files-section">
    <h2>Files</h2>
    <ul class="file-list" id="fileList"></ul>
  </div>

  <script>
    const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB

    async function loadFiles() {
      const res = await fetch('/files');
      const files = await res.json();
      const list = document.getElementById('fileList');
      list.innerHTML = files.map(f =>
        `<li><span>${f}</span><a href="/files/${f}" target="_blank">Download</a></li>`
      ).join('');
    }

    async function uploadFile() {
      const input = document.getElementById('fileInput');
      const file = input.files[0];
      if (!file) return alert('Select a file');

      const progress = document.getElementById('progress');
      const fill = document.getElementById('progressFill');
      const status = document.getElementById('status');
      progress.style.display = 'block';
      fill.style.width = '0%';

      const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

      // 1. Start multipart upload
      status.textContent = 'Starting upload...';
      const startRes = await fetch('/files/multipart/start', { method: 'POST', headers: {'X-Filename': encodeURIComponent(file.name)} });
      const { filename, uploadId } = await startRes.json();

      // 2. Upload chunks
      const parts = [];
      for (let i = 0; i < totalChunks; i++) {
        const start = i * CHUNK_SIZE;
        const end = Math.min(start + CHUNK_SIZE, file.size);
        const chunk = file.slice(start, end);

        const partRes = await fetch(`/files/multipart/${filename}/${uploadId}/${i + 1}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: chunk,
        });
        const part = await partRes.json();
        parts.push(part);

        const pct = Math.round(((i + 1) / totalChunks) * 100);
        fill.style.width = pct + '%';
        status.textContent = `${pct}% — chunk ${i + 1}/${totalChunks} (${(end / 1024 / 1024).toFixed(1)} / ${(file.size / 1024 / 1024).toFixed(1)} MB)`;
      }

      // 3. Complete
      await fetch(`/files/multipart/${filename}/${uploadId}/complete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parts }),
      });

      status.textContent = 'Done!';
      loadFiles();
    }

    loadFiles();
  </script>
</body>
</html>
