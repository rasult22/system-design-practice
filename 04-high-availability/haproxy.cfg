global
    maxconn 1000

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

# --- Stats UI ---
frontend stats
    mode http
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s

# --- Backend apps (HTTP) ---
frontend http_front
    mode http
    bind *:3000
    default_backend app_servers

backend app_servers
    mode http
    balance roundrobin
    option httpchk GET /health
    server app1 app1:3000 check inter 5s fall 3 rise 2
    server app2 app2:3000 check inter 5s fall 3 rise 2
    server app3 app3:3000 check inter 5s fall 3 rise 2

# --- PostgreSQL ---
frontend pg_front
    bind *:5432
    default_backend pg_primary

backend pg_primary
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 5s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg1 pg1:5432 check port 8008
    server pg2 pg2:5432 check port 8008
    server pg3 pg3:5432 check port 8008
